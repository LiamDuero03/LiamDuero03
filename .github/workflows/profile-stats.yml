name: Generate Profile Stats
on:
  # Runs daily at midnight
  schedule: [{cron: "0 0 * * *"}]
  # Allows you to manually trigger it anytime from the Actions tab
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Profile Metrics
        uses: lowlighter/metrics@latest
        with:
          # Your secret token
          token: ${{ secrets.GH_TOKEN }}
          
          # Options
          user: LiamDuero03
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/London
          
          # Private repositories access
          plugin_languages: yes
          plugin_languages_ignored: html, css, shell
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # WakaTime Integration
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_sections: time, projects, languages, editors
          plugin_wakatime_days: 7
          plugin_wakatime_limit: 5
